requires = ["tox>=4"]
env_list = ["lint", "3.14", "3.13", "3.12"]

[env_run_base]
description = "run unit tests"
deps = ["pytest"]
commands = [
    ["pytest", { replace = "posargs", default = ["tests"], extend = true }],
]

[env.lint]
description = "run linter and formatter"
skip_install = true
deps = [ "prek"]
commands = [
    ["prek", "run", "--all-files"],
]

[gh.python]
"3.14" = ["3.14", "lint"]
"3.13" = ["3.13"]
"3.12" = ["3.12"]
